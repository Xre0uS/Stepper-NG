name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 2

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean jar

      - name: Upload stepper-ng.jar
        uses: actions/upload-artifact@v4
        with:
          name: stepper-ng
          path: releases/stepper-ng.jar
          if-no-files-found: error

      - name: Detect version change
        id: version
        if: github.event_name == 'push'
        run: |
          CURRENT_VERSION=$(sed -n 's/.*String VERSION\s*=\s*"\([^"]*\)".*/\1/p' src/main/java/com/xreous/stepperng/Globals.java | head -1)
          echo "current=$CURRENT_VERSION"
          echo "current=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          PREVIOUS_VERSION=""
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            PREVIOUS_VERSION=$(git show HEAD~1:src/main/java/com/xreous/stepperng/Globals.java 2>/dev/null | sed -n 's/.*String VERSION\s*=\s*"\([^"]*\)".*/\1/p' | head -1 || true)
          fi
          echo "previous=$PREVIOUS_VERSION"
          if [ -n "$CURRENT_VERSION" ] && [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: $PREVIOUS_VERSION -> $CURRENT_VERSION"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged: $CURRENT_VERSION"
          fi

      - name: Create GitHub Release
        if: steps.version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.current }}
          name: Stepper-NG v${{ steps.version.outputs.current }}
          generate_release_notes: true
          files: |
            releases/stepper-ng.jar

