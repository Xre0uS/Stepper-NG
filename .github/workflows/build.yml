name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1
          fetch-tags: true

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean jar

      - name: Upload stepper-ng.jar
        uses: actions/upload-artifact@v4
        with:
          name: stepper-ng
          path: releases/stepper-ng.jar
          if-no-files-found: error

      - name: Detect version change
        id: version
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          CURRENT_VERSION=$(grep -oP 'String VERSION\s*=\s*"\K[^"]+' src/main/java/com/xreous/stepperng/Globals.java)
          echo "current=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          if [ -z "$CURRENT_VERSION" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          elif git rev-parse "v$CURRENT_VERSION" >/dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: steps.version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.current }}
          name: Stepper-NG v${{ steps.version.outputs.current }}
          generate_release_notes: true
          files: |
            releases/stepper-ng.jar

